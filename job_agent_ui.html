<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job AI Agent - Career OS</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
    </script>
    <!-- Tailwind with Typography Plugin for Markdown Styling -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.3s ease-in-out; }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastSlide {
            0% { opacity: 0; transform: translateX(100%); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .toast-animate { animation: toastSlide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Markdown Customizations */
        .prose pre { background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; }
        .prose h1, .prose h2, .prose h3 { color: #0f172a; margin-bottom: 0.5em; }
        .prose p { margin-bottom: 1em; }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const API_BASE_URL = "http://127.0.0.1:8000/api";

        // Reusable Markdown Renderer Component
        function MarkdownBlock({ content }) {
            if (!content) return <div className="text-slate-400 italic">No content available.</div>;
            return (
                <div 
                    className="prose prose-sm prose-slate max-w-none" 
                    dangerouslySetInnerHTML={{ __html: marked.parse(content) }} 
                />
            );
        }

        // ─────────────────────────────────────────────────────────────────
        // 1. REUSABLE JOB INPUT FORM 
        // ─────────────────────────────────────────────────────────────────
        function JobInputForm({ onComplete, onCancel, isModal = false }) {
            const [isLoading, setIsLoading] = useState(false);
            const [loadingStep, setLoadingStep] = useState(0);
            const [errorMsg, setErrorMsg] = useState('');
            
            const [selectedCvFile, setSelectedCvFile] = useState(null);
            const [selectedJdFile, setSelectedJdFile] = useState(null);
            
            const [formData, setFormData] = useState({
                base_cv_text: "",
                company: "",
                title: "",
                jd_text: "",
                raw_jd_fallback: "",
                provider: "gemini",
                workModel: "Any",
                jobType: "Any",
                visa: "Not Required (Citizen/PR)"
            });

            const loadingMessages = [
                "Bypassing bot-blockers & fetching URLs...",
                "Scraping job requirements...",
                "Running 12-dimension LangGraph evaluation...",
                "Analyzing skill gaps & candidate strengths...",
                "Tailoring ATS-optimized CV...",
                "Drafting personalized Cover Letter...",
                "Generating Interview prep plan..."
            ];

            useEffect(() => {
                if (errorMsg) {
                    const timer = setTimeout(() => setErrorMsg(''), 6000);
                    return () => clearTimeout(timer);
                }
            }, [errorMsg]);

            // Dynamic Loader text cycler
            useEffect(() => {
                let interval;
                if (isLoading) {
                    interval = setInterval(() => {
                        setLoadingStep(prev => {
                            if (prev < loadingMessages.length - 1) return prev + 1;
                            return prev;
                        });
                    }, 4500);
                } else {
                    setLoadingStep(0);
                }
                return () => clearInterval(interval);
            }, [isLoading]);

            const handleSubmit = async () => {
                if (!selectedCvFile && !formData.base_cv_text) {
                    setErrorMsg("Please upload your Base CV or paste its text.");
                    return;
                }
                if (!selectedJdFile && !formData.jd_text && !formData.raw_jd_fallback) {
                    setErrorMsg("Please provide a Job URL, upload a JD document, or paste raw JD text.");
                    return;
                }

                setIsLoading(true);
                setErrorMsg('');
                
                try {
                    const payload = new FormData();
                    if (selectedCvFile) payload.append("file", selectedCvFile);
                    if (selectedJdFile) payload.append("jd_file", selectedJdFile);
                    
                    payload.append("base_cv_text", formData.base_cv_text);
                    payload.append("company", formData.company);
                    payload.append("title", formData.title);
                    
                    const combined_jd = `${formData.jd_text}\n\n${formData.raw_jd_fallback}`.trim();
                    payload.append("jd_text", combined_jd);
                    payload.append("provider", formData.provider);

                    const response = await fetch(`${API_BASE_URL}/evaluate`, {
                        method: 'POST',
                        body: payload 
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Failed to evaluate job. Check backend console.");
                    }
                    
                    onComplete();
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isLoading) {
                return (
                    <div className="flex flex-col items-center justify-center p-12 text-slate-600 min-h-[300px]">
                        <div className="relative mb-8">
                            <i className="fa-solid fa-circle-notch fa-spin text-5xl text-indigo-200"></i>
                            <i className="fa-solid fa-bolt absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-indigo-600 text-xl"></i>
                        </div>
                        <h3 className="text-xl font-bold mb-2">Agent Active</h3>
                        <p className="text-sm font-semibold text-indigo-600 animate-pulse bg-indigo-50 px-4 py-2 rounded-full shadow-inner">
                            {loadingMessages[loadingStep]}
                        </p>
                    </div>
                );
            }

            return (
                <div className="space-y-6 relative">
                    {/* STICKY TOAST ERROR */}
                    {errorMsg && (
                        <div className="fixed top-6 right-6 bg-red-600 text-white px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-4 toast-animate border-2 border-red-400">
                            <i className="fa-solid fa-circle-exclamation text-2xl"></i>
                            <div className="flex flex-col max-w-sm">
                                <span className="font-bold text-sm">Action Failed</span>
                                <span className="text-xs text-red-100">{errorMsg}</span>
                            </div>
                            <button onClick={() => setErrorMsg('')} className="ml-2 hover:text-red-200 transition-colors">
                                <i className="fa-solid fa-xmark text-xl"></i>
                            </button>
                        </div>
                    )}

                    <div className="space-y-2">
                        <label className="text-sm font-bold text-slate-700">1. Upload Base CV <span className="text-red-500">*</span></label>
                        <div className="border-2 border-dashed border-slate-300 rounded-xl p-6 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors relative group">
                            <input 
                                type="file" accept=".pdf,.doc,.docx"
                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                onChange={(e) => { if (e.target.files[0]) setSelectedCvFile(e.target.files[0]); }}
                            />
                            <i className={`fa-solid fa-cloud-arrow-up text-3xl mb-2 transition-colors ${selectedCvFile ? 'text-green-500' : 'text-indigo-400 group-hover:text-indigo-600'}`}></i>
                            <span className="text-sm font-medium text-slate-600">
                                {selectedCvFile ? <span className="text-green-600 font-bold">{selectedCvFile.name} attached</span> : <span>Drag & Drop PDF/Docx or <span className="text-indigo-600">Browse</span></span>}
                            </span>
                        </div>
                    </div>

                    <hr className="border-slate-200" />

                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="flex-1 space-y-2">
                            <label className="text-sm font-bold text-slate-700">Company Name <span className="text-slate-400 font-normal ml-1">(Optional)</span></label>
                            <input type="text" value={formData.company} onChange={(e) => setFormData({...formData, company: e.target.value})} placeholder="Auto-detected if left blank" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" />
                        </div>
                        <div className="flex-1 space-y-2">
                            <label className="text-sm font-bold text-slate-700">Target Job Title <span className="text-slate-400 font-normal ml-1">(Optional)</span></label>
                            <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} placeholder="Auto-detected if left blank" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" />
                        </div>
                    </div>

                    <div className="space-y-4">
                        <label className="text-sm font-bold text-slate-700 block mb-1">2. Target Job Source <span className="text-red-500">*</span></label>
                        <div className="flex flex-col md:flex-row gap-4">
                            <div className="md:w-1/3 border-2 border-dashed border-slate-300 rounded-xl p-4 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors relative">
                                <input type="file" accept=".pdf,.doc,.docx,.txt" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => { if (e.target.files[0]) setSelectedJdFile(e.target.files[0]); }} />
                                <i className={`fa-solid fa-file-contract text-2xl mb-1 ${selectedJdFile ? 'text-green-500' : 'text-slate-400'}`}></i>
                                <span className="text-xs font-medium text-slate-600 text-center">
                                    {selectedJdFile ? <span className="text-green-600 font-bold break-all">{selectedJdFile.name}</span> : <span>Upload JD Doc</span>}
                                </span>
                            </div>
                            <div className="md:w-2/3">
                                <textarea rows="3" value={formData.jd_text} onChange={(e) => setFormData({...formData, jd_text: e.target.value})} placeholder="Or paste multiple Job URLs. The agent uses Jina AI to bypass blocks and auto-scrape them." className="w-full h-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none custom-scrollbar bg-white"></textarea>
                            </div>
                        </div>
                    </div>

                    {/* COLLAPSIBLE ADVANCED FILTERS */}
                    <details className="group border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
                        <summary className="flex items-center justify-between p-4 font-bold text-slate-800 cursor-pointer hover:bg-slate-50 transition-colors select-none">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg"><i className="fa-solid fa-sliders text-sm"></i></div>
                                Advanced Settings & Fallbacks
                            </div>
                            <i className="fa-solid fa-chevron-down transition-transform duration-300 group-open:rotate-180 text-slate-400"></i>
                        </summary>
                        <div className="p-5 border-t border-slate-100 space-y-6 bg-slate-50/50">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-600 uppercase tracking-wider">Raw CV Text (Fallback)</label>
                                    <textarea rows="3" value={formData.base_cv_text} onChange={(e) => setFormData({...formData, base_cv_text: e.target.value})} placeholder="Paste CV text if PDF upload fails..." className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none custom-scrollbar"></textarea>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-600 uppercase tracking-wider">Raw JD Text (Fallback)</label>
                                    <textarea rows="3" value={formData.raw_jd_fallback} onChange={(e) => setFormData({...formData, raw_jd_fallback: e.target.value})} placeholder="Paste raw JD text if bot-blockers prevent URL scraping..." className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none custom-scrollbar"></textarea>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <label className="text-xs font-bold text-slate-600 uppercase tracking-wider block border-b pb-2">Target Preferences</label>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Work Model</label>
                                        <select value={formData.workModel} onChange={e => setFormData({...formData, workModel: e.target.value})} className="w-full border rounded-lg p-2 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500"><option>Any</option><option>Remote</option><option>Hybrid</option><option>On-site</option></select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Job Type</label>
                                        <select value={formData.jobType} onChange={e => setFormData({...formData, jobType: e.target.value})} className="w-full border rounded-lg p-2 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500"><option>Any</option><option>Permanent / Full-Time</option><option>Contract / Freelance</option><option>Internship</option></select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Sponsorship / Visa</label>
                                        <select value={formData.visa} onChange={e => setFormData({...formData, visa: e.target.value})} className="w-full border rounded-lg p-2 text-xs bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500"><option>Not Required (Citizen/PR)</option><option>Require Sponsorship</option><option>Only Visa-Supported Roles</option></select>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-600 uppercase tracking-wider block border-b pb-2">AI Engine</label>
                                <select value={formData.provider} onChange={(e) => setFormData({...formData, provider: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium"><option value="gemini">Google Gemini (Recommended)</option><option value="openai">OpenAI (ChatGPT)</option><option value="local (llama.cpp)">Local Model (Llama.cpp via Tailscale)</option></select>
                            </div>
                        </div>
                    </details>

                    <div className="flex gap-4 pt-4">
                        {isModal && <button onClick={onCancel} className="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">Cancel</button>}
                        <button onClick={handleSubmit} className="flex-[2] bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition-transform active:scale-[0.98] flex justify-center items-center gap-2">
                            <i className="fa-solid fa-bolt text-yellow-400"></i> Run Auto-Extraction & Evaluate
                        </button>
                    </div>
                </div>
            );
        }

        // ─────────────────────────────────────────────────────────────────
        // 2. KANBAN BOARD COMPONENT
        // ─────────────────────────────────────────────────────────────────
        function KanbanBoard({ jobs, onUpdateStatus, onViewJob }) {
            const columns = [
                { id: "To Apply", title: "To Apply", icon: "fa-inbox", color: "bg-slate-200 text-slate-700" },
                { id: "Applied", title: "Applied", icon: "fa-paper-plane", color: "bg-blue-100 text-blue-700" },
                { id: "Interviewing", title: "Interviewing", icon: "fa-comments", color: "bg-purple-100 text-purple-700" },
                { id: "Rejected", title: "Rejected", icon: "fa-circle-xmark", color: "bg-red-100 text-red-700" }
            ];

            return (
                <div className="flex-1 flex overflow-x-auto p-6 gap-6 custom-scrollbar bg-slate-100 h-full">
                    {columns.map(col => (
                        <div key={col.id} className="flex flex-col w-80 shrink-0 h-full max-h-full">
                            <div className={`px-4 py-3 rounded-t-xl font-bold flex items-center justify-between ${col.color}`}>
                                <div className="flex items-center gap-2"><i className={`fa-solid ${col.icon}`}></i> {col.title}</div>
                                <span className="bg-white/50 px-2 py-0.5 rounded-full text-xs">{jobs.filter(j => j.status === col.id).length}</span>
                            </div>
                            <div className="flex-1 bg-slate-200/50 rounded-b-xl p-3 overflow-y-auto custom-scrollbar space-y-3 border-x border-b border-slate-200 shadow-inner">
                                {jobs.filter(j => j.status === col.id).map(job => (
                                    <div key={job.id} onClick={() => onViewJob(job)} className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-300 transition-all cursor-pointer">
                                        <div className="flex justify-between items-start mb-2">
                                            <h4 className="font-bold text-slate-800 leading-tight">{job.title}</h4>
                                            <span className={`text-[10px] font-bold px-2 py-1 rounded ml-2 ${job.score >= 80 ? 'bg-green-100 text-green-700' : job.score >= 60 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>{job.score}/100</span>
                                        </div>
                                        <p className="text-xs font-semibold text-slate-500 mb-4">{job.company}</p>
                                        <div className="flex justify-between items-center pt-3 border-t border-slate-100" onClick={(e) => e.stopPropagation()}>
                                            <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">View Workspace</span>
                                            <select value={job.status} onChange={(e) => onUpdateStatus(job.id, e.target.value)} className="text-xs border rounded p-1 text-slate-600 focus:outline-none bg-slate-50 hover:bg-slate-100 cursor-pointer">
                                                {columns.map(c => <option key={c.id} value={c.id}>Move: {c.title}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // ─────────────────────────────────────────────────────────────────
        // 3. AGENT WORKSPACE (WITH SIDEBAR & MARKDOWN & CHAT)
        // ─────────────────────────────────────────────────────────────────
        function AgentWorkspace({ jobData, onBack, allJobs, setActiveJob }) {
            const [leftTab, setLeftTab] = useState('ats');
            const [rightTab, setRightTab] = useState('roadmap');
            const [showDownloadMenu, setShowDownloadMenu] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true); // Toggle Sidebar

            // ATS CV Editing State
            const fullData = jobData.full_data || {};
            const docs = (fullData.generated_docs && fullData.generated_docs.length > 0) ? fullData.generated_docs[0] : {};
            const [isEditingCv, setIsEditingCv] = useState(false);
            const [cvContent, setCvContent] = useState(docs.tailored_cv_markdown || "");

            // Chat Agent State
            const [chatInput, setChatInput] = useState("");
            const [chatHistory, setChatHistory] = useState([
                { role: "agent", content: "I've tailored your CV and drafted a Cover Letter for this role. The NLP scan confirmed Visa Sponsorship aligns with your profile. What would you like to adjust?" }
            ]);
            
            const evals = (fullData.evaluations && fullData.evaluations.length > 0) ? fullData.evaluations[0] : {};
            const coach = (fullData.coach_outputs && fullData.coach_outputs.length > 0) ? fullData.coach_outputs[0] : {};
            const jobInput = (fullData.jobs_to_process && fullData.jobs_to_process.length > 0) ? fullData.jobs_to_process[0] : {};
            const changesMade = docs.changes_made || []; // Will populate in Phase B

            // Keep CV text synced if job changes
            useEffect(() => {
                setCvContent(docs.tailored_cv_markdown || "");
                setIsEditingCv(false);
            }, [jobData.id]);

            const handleSendMessage = () => {
                if (!chatInput.trim()) return;
                setChatHistory([...chatHistory, { role: "user", content: chatInput }, { role: "agent", content: "I am processing your request... (LLM backend wiring coming in Phase B!)" }]);
                setChatInput("");
            };

            const renderGrade = (val) => {
                const colors = {
                    'A': 'bg-green-100 text-green-800 border-green-200',
                    'B': 'bg-blue-100 text-blue-800 border-blue-200',
                    'C': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                    'D': 'bg-orange-100 text-orange-800 border-orange-200',
                    'F': 'bg-red-100 text-red-800 border-red-200',
                };
                const colorClass = colors[val] || 'bg-slate-100 text-slate-800 border-slate-200';
                return <span className={`px-2 py-0.5 rounded text-[10px] font-bold border ${colorClass}`}>{val || '-'}</span>;
            };

            const dimensionsList = [
                { key: 'Tech Stack', val: evals.tech_stack_match },
                { key: 'Seniority', val: evals.role_seniority },
                { key: 'Salary Align', val: evals.salary_alignment },
                { key: 'Remote/Visa', val: evals.remote_policy },
                { key: 'Co. Stage', val: evals.company_stage },
                { key: 'Domain Fit', val: evals.domain_fit },
                { key: 'Growth', val: evals.growth_opportunities },
                { key: 'WLB', val: evals.work_life_balance },
                { key: 'Timezone', val: evals.commute_timezone },
                { key: 'Keywords', val: evals.ats_keyword_density },
            ];

            return (
                <div className="flex h-full bg-slate-50 relative min-w-0 w-full">
                    
                    {/* TOGGLEABLE SIDEBAR */}
                    <div className={`bg-white border-r border-slate-200 flex flex-col shrink-0 z-20 transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-0 overflow-hidden'}`}>
                        <div className="p-3 border-b bg-slate-50 text-[10px] font-bold text-slate-500 uppercase tracking-wider flex justify-between items-center min-w-[256px]">
                            <span>Job Queue</span>
                            <span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full">{allJobs.length} Saved</span>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar min-w-[256px]">
                            {allJobs.map(job => (
                                <div key={job.id} onClick={() => setActiveJob(job)} className={`p-4 border-b cursor-pointer transition-colors ${job.id === jobData.id ? 'bg-indigo-50 border-l-4 border-l-indigo-600' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                    <div className="flex justify-between items-start mb-1">
                                        <h3 className="font-bold text-xs text-slate-900 leading-tight">{job.title}</h3>
                                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${job.score >= 80 ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{job.score}</span>
                                    </div>
                                    <p className="text-[11px] text-slate-500 font-semibold flex items-center gap-1">
                                        <i className="fa-regular fa-building"></i> {job.company}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MAIN WORKSPACE AREA */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <div className="bg-white border-b shadow-sm p-4 lg:px-6 z-10 shrink-0 flex flex-col gap-4">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-400 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 rounded transition-colors hidden md:block">
                                        <i className={`fa-solid ${isSidebarOpen ? 'fa-chevron-left' : 'fa-chevron-right'}`}></i>
                                    </button>
                                    <div>
                                        <h2 className="text-xl md:text-2xl font-extrabold text-slate-900 flex items-center gap-3">
                                            {jobData.company} <span className="text-slate-300 font-light">/</span> {jobData.title}
                                            <span className={`text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1 ${jobData.score >= 80 ? 'bg-green-100 text-green-800' : jobData.score >= 60 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800'}`}>
                                                <i className="fa-solid fa-check"></i> Match: {evals.overall_score || jobData.score}/100 
                                                <span className="opacity-50 mx-1">|</span> Verdict: {evals.hire_verdict || "Evaluating..."}
                                            </span>
                                        </h2>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 relative">
                                    <div className="relative">
                                        <button onClick={() => setShowDownloadMenu(!showDownloadMenu)} onBlur={() => setTimeout(() => setShowDownloadMenu(false), 200)} className="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-bold rounded-lg text-sm shadow-sm hover:bg-slate-50 flex items-center gap-2 transition-colors">
                                            <i className="fa-solid fa-download"></i> Download <i className="fa-solid fa-caret-down ml-1 text-slate-400"></i>
                                        </button>
                                        {showDownloadMenu && (
                                            <div className="absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50">
                                                <button className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 border-b flex items-center gap-2"><i className="fa-solid fa-file-pdf text-red-500"></i> PDF (.pdf)</button>
                                                <button className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 flex items-center gap-2"><i className="fa-solid fa-file-word text-blue-500"></i> Word (.docx)</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex overflow-x-auto gap-4 custom-scrollbar pb-1">
                                {dimensionsList.map((dim, i) => (
                                    <div key={i} className="flex flex-col gap-1 shrink-0 items-center min-w-[70px]">
                                        <span className="text-[9px] uppercase font-bold text-slate-400 tracking-wider whitespace-nowrap">{dim.key}</span>
                                        {renderGrade(dim.val)}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row flex-1 min-h-0 bg-slate-100">
                            {/* LEFT PANE (DOCUMENTS) */}
                            <div className="w-full lg:w-3/5 flex flex-col border-r border-slate-200 bg-white h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
                                <div className="flex border-b bg-white overflow-x-auto custom-scrollbar shrink-0 px-2 pt-2 justify-between items-end">
                                    <div className="flex">
                                        <button onClick={() => setLeftTab('jd')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'jd' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-briefcase mr-2"></i> Job Description</button>
                                        <button onClick={() => setLeftTab('ats')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'ats' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-file-contract mr-2"></i> ATS Optimized CV</button>
                                        <button onClick={() => setLeftTab('cl')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'cl' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-envelope-open-text mr-2"></i> Cover Letter</button>
                                        <button onClick={() => setLeftTab('base')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'base' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-file-lines mr-2"></i> Base CV</button>
                                    </div>
                                    {leftTab === 'ats' && (
                                        <button onClick={() => setIsEditingCv(!isEditingCv)} className={`mb-2 mr-4 px-3 py-1.5 text-xs font-bold rounded shadow-sm transition-colors ${isEditingCv ? 'bg-green-500 hover:bg-green-600 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200'}`}>
                                            <i className={`fa-solid ${isEditingCv ? 'fa-check' : 'fa-pen'} mr-1`}></i> {isEditingCv ? 'Save Edits' : 'Edit CV'}
                                        </button>
                                    )}
                                </div>
                                
                                <div className="flex-1 overflow-y-auto custom-scrollbar bg-white flex">
                                    {leftTab === 'jd' && <div className="p-6 md:p-8"><MarkdownBlock content={jobInput.raw_text} /></div>}
                                    {leftTab === 'cl' && <div className="p-6 md:p-8"><MarkdownBlock content={docs.cover_letter_markdown} /></div>}
                                    {leftTab === 'base' && <pre className="p-6 md:p-8 font-sans text-sm whitespace-pre-wrap text-slate-700 bg-slate-50 w-full h-full">{fullData.base_cv || "No Base CV available."}</pre>}
                                    
                                    {/* ATS CV TAB WITH SPLIT HIGHLIGHTS PANEL */}
                                    {leftTab === 'ats' && (
                                        <React.Fragment>
                                            <div className="w-3/4 p-6 md:p-8 border-r border-slate-100">
                                                {isEditingCv ? (
                                                    <textarea 
                                                        value={cvContent} 
                                                        onChange={(e) => setCvContent(e.target.value)} 
                                                        className="w-full h-full min-h-[500px] p-4 border-2 border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono custom-scrollbar bg-slate-50"
                                                    />
                                                ) : (
                                                    <MarkdownBlock content={cvContent} />
                                                )}
                                            </div>
                                            <div className="w-1/4 bg-slate-50 p-4">
                                                <h4 className="font-bold text-xs uppercase text-slate-500 mb-3 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-indigo-500"></i> Optimization Highlights</h4>
                                                {changesMade.length > 0 ? (
                                                    <ul className="space-y-3">
                                                        {changesMade.map((change, i) => (
                                                            <li key={i} className="text-xs text-slate-700 bg-white p-2.5 rounded border border-slate-200 shadow-sm leading-relaxed"><i className="fa-solid fa-plus text-green-500 mr-1.5"></i> {change}</li>
                                                        ))}
                                                    </ul>
                                                ) : (
                                                    <p className="text-xs text-slate-400 italic">No specific highlights recorded yet. (Backend Phase B incoming!)</p>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    )}
                                </div>
                            </div>

                            {/* RIGHT PANE (COACH & ROADMAP) */}
                            <div className="w-full lg:w-2/5 flex flex-col bg-slate-50 h-[50vh] lg:h-full shrink-0 lg:shrink min-w-0">
                                <div className="flex border-b bg-white overflow-x-auto custom-scrollbar shrink-0 px-2 pt-2">
                                    <button onClick={() => setRightTab('roadmap')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'roadmap' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-map-location-dot mr-2"></i> Gaps & Roadmap</button>
                                    <button onClick={() => setRightTab('chat')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'chat' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-robot mr-2"></i> Chat Agent</button>
                                    <button onClick={() => setRightTab('coach')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'coach' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-chalkboard-user mr-2"></i> Interview Coach</button>
                                </div>

                                <div className="flex-1 overflow-hidden relative flex flex-col bg-slate-50">
                                    
                                    {/* WIRED CHAT AGENT */}
                                    {rightTab === 'chat' && (
                                        <div className="flex flex-col h-full">
                                            <div className="flex-1 p-4 overflow-y-auto space-y-4 custom-scrollbar">
                                                {chatHistory.map((msg, i) => (
                                                    <div key={i} className={`flex items-start gap-3 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'user' ? 'bg-slate-800 text-white' : 'bg-indigo-600 text-white'}`}>
                                                            <i className={`fa-solid ${msg.role === 'user' ? 'fa-user' : 'fa-robot'} text-xs`}></i>
                                                        </div>
                                                        <div className={`p-3.5 rounded-2xl shadow-sm max-w-[85%] text-sm ${msg.role === 'user' ? 'bg-indigo-100 text-indigo-900 rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none'}`}>
                                                            {msg.content}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="p-4 bg-white border-t border-slate-200 shrink-0">
                                                <div className="relative flex items-center">
                                                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="E.g. Make the cover letter more aggressive..." className="w-full bg-slate-100 border border-transparent focus:border-indigo-300 focus:bg-white rounded-full py-3 pl-4 pr-12 text-sm focus:outline-none transition-all" />
                                                    <button onClick={handleSendMessage} className="absolute right-2 w-8 h-8 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center transition-colors">
                                                        <i className="fa-solid fa-paper-plane text-xs"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {rightTab === 'roadmap' && (
                                        <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar space-y-5">
                                            {/* MOVED: STRENGTHS FIRST */}
                                            <div className="p-4 bg-green-50 border border-green-100 rounded-xl shadow-sm">
                                                <h3 className="font-bold text-sm text-green-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-shield-halved"></i> Candidate Strengths</h3>
                                                <ul className="text-xs text-green-700 space-y-1.5 ml-4 list-disc">
                                                    {evals.strengths && evals.strengths.length > 0 ? evals.strengths.map((s, i) => <li key={i}>{s}</li>) : <li>No specific strengths logged.</li>}
                                                </ul>
                                            </div>

                                            {evals.gap_analysis && evals.gap_analysis.length > 0 && (
                                                <div className="p-4 bg-red-50 border border-red-100 rounded-xl shadow-sm">
                                                    <h3 className="font-bold text-sm text-red-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> Identified Skill Gaps</h3>
                                                    <ul className="text-xs text-red-700 space-y-1.5 ml-4 list-disc">
                                                        {evals.gap_analysis.map((g, i) => <li key={i}>{g}</li>)}
                                                    </ul>
                                                </div>
                                            )}
                                            
                                            <div>
                                                <h3 className="font-bold text-sm text-slate-800 pt-2 border-t border-slate-200 mb-3">Learning Resources</h3>
                                                <details className="group bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-3" open>
                                                    <summary className="p-3.5 font-bold text-sm text-slate-800 cursor-pointer hover:bg-slate-50 flex items-center justify-between select-none">
                                                        <span className="flex items-center gap-2"><i className="fa-solid fa-graduation-cap text-indigo-500"></i> Recommended Curriculum</span>
                                                        <i className="fa-solid fa-chevron-down text-slate-400 transition-transform group-open:rotate-180"></i>
                                                    </summary>
                                                    <div className="p-2 border-t border-slate-100 space-y-2 bg-slate-50/50 max-h-[400px] overflow-y-auto custom-scrollbar">
                                                        {docs.learning_roadmap && docs.learning_roadmap.length > 0 ? docs.learning_roadmap.map((res, i) => (
                                                            <div key={i} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm flex items-start justify-between hover:border-indigo-300 transition-colors">
                                                                <div>
                                                                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded uppercase ${String(res.type || res.cost).toLowerCase().includes('free') ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-purple-100 text-purple-700 border border-purple-200'} mb-1 inline-block`}>
                                                                        {res.type || res.cost || "Resource"}
                                                                    </span>
                                                                    <h4 className="font-semibold text-xs text-slate-800 leading-tight">{res.topic || res.title}</h4>
                                                                </div>
                                                                {res.url && res.url !== "#" && (
                                                                    <a href={res.url} target="_blank" className="w-7 h-7 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-colors shrink-0 ml-2">
                                                                        <i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                                                                    </a>
                                                                )}
                                                            </div>
                                                        )) : (
                                                            <div className="text-xs text-slate-500 p-2 italic">No resources populated yet. (Backend Phase B incoming!)</div>
                                                        )}
                                                    </div>
                                                </details>
                                            </div>
                                        </div>
                                    )}

                                    {rightTab === 'coach' && (
                                        <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar space-y-4">
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-blue-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-comments text-blue-500"></i> Interview Questions</h3>
                                                <MarkdownBlock content={coach.interview_questions} />
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-green-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-money-bill-wave text-green-500"></i> Salary Strategy</h3>
                                                <MarkdownBlock content={coach.salary_strategy} />
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-purple-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-regular fa-calendar-check text-purple-500"></i> 30-Day Prep Plan</h3>
                                                <MarkdownBlock content={coach.prep_plan} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        // ─────────────────────────────────────────────────────────────────
        // 4. MAIN APP CONTROLLER
        // ─────────────────────────────────────────────────────────────────
        function App() {
            const [view, setView] = useState('input'); 
            const [activeJob, setActiveJob] = useState(null);
            const [jobs, setJobs] = useState([]);

            const fetchJobs = async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/jobs`);
                    if(res.ok) {
                        const data = await res.json();
                        setJobs(data.jobs || []);
                        return data.jobs || [];
                    }
                } catch (err) {
                    console.error("Failed to fetch jobs.", err);
                }
                return [];
            };

            useEffect(() => { fetchJobs(); }, []);

            const handleUpdateStatus = async (jobId, newStatus) => {
                try {
                    await fetch(`${API_BASE_URL}/jobs/${jobId}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    fetchJobs();
                } catch (err) {
                    console.error("Failed to update status", err);
                }
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-50">
                    <div className="h-16 border-b bg-slate-900 text-white flex items-center justify-between px-6 shrink-0 z-30 shadow-sm">
                        <div className="font-bold text-lg flex items-center gap-3">
                            <button onClick={() => { setView('dashboard'); setActiveJob(null); }} className="p-1 hover:text-indigo-400 transition-colors md:hidden"><i className="fa-solid fa-bars"></i></button>
                            <div className="w-8 h-8 rounded bg-indigo-500 flex items-center justify-center shadow-lg"><i className="fa-solid fa-robot text-white text-sm"></i></div>
                            Career OS
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => { setView('dashboard'); setActiveJob(null); }} className={`px-4 py-2 rounded-lg text-sm font-bold border transition-colors flex items-center gap-2 ${view === 'dashboard' && !activeJob ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-800 hover:bg-slate-700 border-slate-700 text-slate-300'}`}>
                                <i className="fa-solid fa-table-columns"></i> <span className="hidden md:inline">Kanban Board</span>
                            </button>
                            <button onClick={() => { setView('input'); setActiveJob(null); }} className={`px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 flex items-center gap-2 ${view === 'input' ? 'bg-indigo-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`}>
                                <i className="fa-solid fa-plus"></i> <span className="hidden md:inline">Add New Job</span>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {view === 'input' && (
                            <div className="absolute inset-0 flex items-center justify-center p-4 bg-slate-100 overflow-y-auto custom-scrollbar">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-6 md:p-8 border border-slate-200 my-auto">
                                    <div className="flex flex-col items-center justify-center mb-8">
                                        <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Job Evaluation Agent</h1>
                                        <p className="text-slate-500 text-sm text-center">Upload your CV and target job details to generate an ATS-optimized match.</p>
                                    </div>
                                    <JobInputForm onComplete={async () => {
                                        const updatedJobs = await fetchJobs();
                                        setActiveJob(updatedJobs[updatedJobs.length - 1]);
                                        setView('dashboard');
                                    }} />
                                </div>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="absolute inset-0 flex">
                                {!activeJob ? (
                                    <KanbanBoard jobs={jobs} onUpdateStatus={handleUpdateStatus} onViewJob={(job) => setActiveJob(job)} />
                                ) : (
                                    <AgentWorkspace jobData={activeJob} allJobs={jobs} setActiveJob={setActiveJob} onBack={() => setActiveJob(null)} />
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
