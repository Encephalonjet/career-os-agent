<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job AI Agent - Career OS</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Markdown Parser & Diff Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script>
        Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
    </script>
    <!-- Tailwind with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.3s ease-in-out; }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastSlide {
            0% { opacity: 0; transform: translateX(100%); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .toast-animate { animation: toastSlide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .prose pre { background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; }
        .prose h1, .prose h2, .prose h3 { color: #0f172a; margin-bottom: 0.5em; }
        .prose p { margin-bottom: 1em; }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const API_BASE_URL = "http://127.0.0.1:8000/api";

        const NotionIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="14" height="14" fill="currentColor" className="mr-1">
                <path d="M448 108.9C448 94.7 437.3 84 424.3 84H23.7C10.7 84 0 94.7 0 108.9v294.2C0 417.3 10.7 428 23.7 428h400.6c13 0 23.7-10.7 23.7-24.9V108.9zM151.7 348.6c-7.9 0-14.3-6.4-14.3-14.3V184.2c0-7.9 6.4-14.3 14.3-14.3h46.7c7.9 0 14.3 6.4 14.3 14.3v102.4l78.7-104.9c4.9-6.5 12.6-10.4 20.8-10.4h37.4c7.9 0 14.3 6.4 14.3 14.3v150.1c0 7.9-6.4 14.3-14.3 14.3h-46.7c-7.9 0-14.3-6.4-14.3-14.3V219.1l-78.7 104.9c-4.9 6.5-12.6 10.4-20.8 10.4h-37.4z"/>
            </svg>
        );

        function MarkdownBlock({ content }) {
            if (!content) return <div className="text-slate-400 italic">No content available.</div>;
            let htmlContent = marked.parse(content);
            htmlContent = htmlContent.replace(/<a href="/g, '<a target="_blank" rel="noopener noreferrer" href="');
            return <div className="prose prose-sm prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: htmlContent }} />;
        }

        const getDiffHtml = (oldText, newText) => {
            if (!oldText || !newText) return marked.parse(newText || "");
            const dmp = new diff_match_patch();
            const diffs = dmp.diff_main(oldText, newText);
            dmp.diff_cleanupSemantic(diffs);
            let combinedMarkdown = "";
            diffs.forEach(part => {
                const op = part[0];
                const data = part[1];
                if (op === 1) { 
                    const wrapped = data.replace(/([^\n]+)/g, '<mark class="bg-green-100 text-green-900 rounded-sm px-0.5 shadow-sm">$1</mark>');
                    combinedMarkdown += wrapped;
                } else if (op === 0) { 
                    combinedMarkdown += data;
                }
            });
            return marked.parse(combinedMarkdown);
        };

        const downloadDoc = (title, content, type) => {
            if (!content) return;
            if (type === 'pdf') {
                const printWindow = window.open('', '', 'height=600,width=800');
                printWindow.document.write('\x3Chtml\x3E\x3Chead\x3E\x3Ctitle\x3E' + title + '\x3C/title\x3E\x3Cstyle\x3Ebody{font-family: sans-serif; line-height: 1.6; color: #333; padding: 20px;} h1, h2, h3 {color: #111;}\x3C/style\x3E\x3C/head\x3E\x3Cbody\x3E');
                printWindow.document.write(marked.parse(content));
                printWindow.document.write('\x3C/body\x3E\x3C/html\x3E');
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => { printWindow.print(); printWindow.close(); }, 250);
            } else if (type === 'docx') {
                const header = "\x3Chtml xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'\x3E\x3Chead\x3E\x3Cmeta charset='utf-8'\x3E\x3Ctitle\x3E" + title + "\x3C/title\x3E\x3C/head\x3E\x3Cbody\x3E";
                const footer = "\x3C/body\x3E\x3C/html\x3E";
                const html = header + marked.parse(content) + footer;
                const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title.replace(/\s+/g, '_')}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        function JobInputForm({ onComplete, onCancel, globalCvFile, globalCvText, setGlobalCvFile, setGlobalCvText }) {
            const [isLoading, setIsLoading] = useState(false);
            const [loadingStep, setLoadingStep] = useState(0);
            const [errorMsg, setErrorMsg] = useState('');
            
            const [useSavedCv, setUseSavedCv] = useState(!!globalCvFile || !!globalCvText);
            const [selectedCvFile, setSelectedCvFile] = useState(null);
            const [selectedJdFile, setSelectedJdFile] = useState(null);
            
            const [formData, setFormData] = useState({
                base_cv_text: "", company: "", title: "", location: "", jd_text: "",
                raw_jd_fallback: "", provider: "gemini", workModel: "Any",
                jobType: "Any", visa: "Not Required (Citizen/PR)"
            });

            const loadingMessages = [
                "Bypassing bot-blockers & fetching URLs...",
                "Scraping job requirements...",
                "Running 12-dimension LangGraph evaluation...",
                "Tailoring ATS-optimized CV...",
                "Drafting personalized Cover Letter...",
                "Coding Custom Portfolio Webpage...",
                "Generating Interview prep plan..."
            ];

            useEffect(() => {
                if (errorMsg) {
                    const timer = setTimeout(() => setErrorMsg(''), 6000);
                    return () => clearTimeout(timer);
                }
            }, [errorMsg]);

            useEffect(() => {
                let interval;
                if (isLoading) {
                    interval = setInterval(() => {
                        setLoadingStep(prev => prev < loadingMessages.length - 1 ? prev + 1 : prev);
                    }, 4500);
                } else setLoadingStep(0);
                return () => clearInterval(interval);
            }, [isLoading]);

            const handleSubmit = async () => {
                const isManual = !!selectedJdFile || !!formData.jd_text || !!formData.raw_jd_fallback;
                const isAuto = !!formData.title;

                if (!isManual && !isAuto) {
                    setErrorMsg("Please either provide a Job Description/URL or enter a Target Job Title.");
                    return;
                }
                if (!useSavedCv && !selectedCvFile && !formData.base_cv_text) {
                    setErrorMsg("Please upload your Base CV or paste its text.");
                    return;
                }

                setIsLoading(true);
                setErrorMsg('');
                
                try {
                    const cvTextToUse = useSavedCv ? globalCvText : formData.base_cv_text;

                    if (!isManual && isAuto) {
                        const queryLocation = `${formData.location}`.trim();
                        const payload = new FormData();
                        
                        if (useSavedCv) {
                            if (globalCvFile) payload.append("file", globalCvFile);
                            payload.append("base_cv_text", globalCvText || "");
                        } else {
                            if (selectedCvFile) payload.append("file", selectedCvFile);
                            payload.append("base_cv_text", formData.base_cv_text || "");
                            setGlobalCvFile(selectedCvFile);
                            setGlobalCvText(formData.base_cv_text);
                        }
                        
                        payload.append("target_title", formData.title);
                        payload.append("location", queryLocation);
                        payload.append("provider", formData.provider);
                        payload.append("max_jobs", 2);
                        payload.append("job_board", "All Supported Boards");
                        payload.append("work_model", formData.workModel);
                        payload.append("job_type", formData.jobType);
                        payload.append("visa", formData.visa);

                        const response = await fetch(`${API_BASE_URL}/auto-fetch`, { method: 'POST', body: payload });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.detail || "Auto-Search failed.");
                        }
                        onComplete(); 
                    } else {
                        const payload = new FormData();
                        if (useSavedCv) {
                            if (globalCvFile) payload.append("file", globalCvFile);
                            payload.append("base_cv_text", globalCvText || "");
                        } else {
                            if (selectedCvFile) payload.append("file", selectedCvFile);
                            payload.append("base_cv_text", formData.base_cv_text || "");
                            setGlobalCvFile(selectedCvFile);
                            setGlobalCvText(formData.base_cv_text);
                        }
                        if (selectedJdFile) payload.append("jd_file", selectedJdFile);
                        payload.append("company", formData.company);
                        payload.append("title", formData.title);
                        payload.append("jd_text", `${formData.jd_text}\n\n${formData.raw_jd_fallback}`.trim());
                        payload.append("provider", formData.provider);

                        const response = await fetch(`${API_BASE_URL}/evaluate`, { method: 'POST', body: payload });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.detail || "Failed to evaluate job. Check backend console.");
                        }
                        onComplete();
                    }
                } catch (error) {
                    setErrorMsg(error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isLoading) {
                return (
                    <div className="flex flex-col items-center justify-center p-12 text-slate-600 min-h-[300px]">
                        <div className="relative mb-8">
                            <i className="fa-solid fa-circle-notch fa-spin text-5xl text-indigo-200"></i>
                            <i className="fa-solid fa-bolt absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-indigo-600 text-xl"></i>
                        </div>
                        <h3 className="text-xl font-bold mb-2">Agent Active</h3>
                        <p className="text-sm font-semibold text-indigo-600 animate-pulse bg-indigo-50 px-4 py-2 rounded-full shadow-inner">{loadingMessages[loadingStep]}</p>
                    </div>
                );
            }

            return (
                <div className="space-y-6 relative">
                    {errorMsg && (
                        <div className="fixed top-6 right-6 bg-red-600 text-white px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-4 toast-animate border-2 border-red-400">
                            <i className="fa-solid fa-circle-exclamation text-2xl"></i>
                            <div className="flex flex-col max-w-sm">
                                <span className="font-bold text-sm">Action Failed</span>
                                <span className="text-xs text-red-100">{errorMsg}</span>
                            </div>
                            <button onClick={() => setErrorMsg('')} className="ml-2 hover:text-red-200 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    )}

                    <div className="space-y-2">
                        <label className="text-sm font-bold text-slate-700">1. Base CV <span className="text-red-500">*</span></label>
                        {useSavedCv ? (
                            <div className="border-2 border-green-400 bg-green-50 rounded-xl p-4 flex justify-between items-center shadow-sm">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white p-2 rounded-lg shadow-sm"><i className="fa-solid fa-file-circle-check text-green-600 text-xl"></i></div>
                                    <div>
                                        <p className="text-sm font-bold text-green-800">Using Saved CV</p>
                                        <p className="text-xs text-green-600 font-medium">{globalCvFile ? globalCvFile.name : 'Raw text fallback loaded'}</p>
                                    </div>
                                </div>
                                <button onClick={() => setUseSavedCv(false)} className="text-xs font-bold text-slate-600 hover:text-slate-800 bg-white border border-slate-300 px-3 py-2 rounded-lg shadow-sm transition-colors">Upload Different CV</button>
                            </div>
                        ) : (
                            <div className="border-2 border-dashed border-slate-300 rounded-xl p-6 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors relative group">
                                <input type="file" accept=".pdf,.doc,.docx" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => { if (e.target.files[0]) setSelectedCvFile(e.target.files[0]); }} />
                                <i className={`fa-solid fa-cloud-arrow-up text-3xl mb-2 transition-colors ${selectedCvFile ? 'text-green-500' : 'text-indigo-400 group-hover:text-indigo-600'}`}></i>
                                <span className="text-sm font-medium text-slate-600">{selectedCvFile ? <span className="text-green-600 font-bold">{selectedCvFile.name} attached</span> : <span>Drag & Drop PDF/Docx or <span className="text-indigo-600">Browse</span></span>}</span>
                            </div>
                        )}
                    </div>

                    <hr className="border-slate-200" />

                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="flex-1 space-y-2">
                            <label className="text-sm font-bold text-slate-700">Company Name</label>
                            <input type="text" value={formData.company} onChange={(e) => setFormData({...formData, company: e.target.value})} placeholder="Optional" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" />
                        </div>
                        <div className="flex-1 space-y-2">
                            <label className="text-sm font-bold text-slate-700">Target Job Title</label>
                            <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} placeholder="Optional" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" />
                        </div>
                        <div className="flex-1 space-y-2">
                            <label className="text-sm font-bold text-slate-700">Location <span className="text-slate-400 font-normal ml-1">(Optional)</span></label>
                            <input type="text" value={formData.location} onChange={(e) => setFormData({...formData, location: e.target.value})} placeholder="e.g. London" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white" />
                        </div>
                    </div>

                    <div className="space-y-4">
                        <label className="text-sm font-bold text-slate-700 block mb-1">2. Target Job Source</label>
                        <div className="flex flex-col md:flex-row gap-4">
                            <div className="md:w-1/3 border-2 border-dashed border-slate-300 rounded-xl p-4 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors relative">
                                <input type="file" accept=".pdf,.doc,.docx,.txt" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => { if (e.target.files[0]) setSelectedJdFile(e.target.files[0]); }} />
                                <i className={`fa-solid fa-file-contract text-2xl mb-1 ${selectedJdFile ? 'text-green-500' : 'text-slate-400'}`}></i>
                                <span className="text-xs font-medium text-slate-600 text-center">{selectedJdFile ? <span className="text-green-600 font-bold break-all">{selectedJdFile.name}</span> : <span>Upload JD Doc</span>}</span>
                            </div>
                            <div className="md:w-2/3">
                                <textarea rows="3" value={formData.jd_text} onChange={(e) => setFormData({...formData, jd_text: e.target.value})} placeholder="Or paste Job URLs here..." className="w-full h-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none custom-scrollbar bg-white"></textarea>
                            </div>
                        </div>
                    </div>

                    <details className="group border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
                        <summary className="flex items-center justify-between p-4 font-bold text-slate-800 cursor-pointer hover:bg-slate-50 transition-colors select-none">
                            <div className="flex items-center gap-3"><div className="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg"><i className="fa-solid fa-sliders text-sm"></i></div> Advanced Settings & Engine</div>
                            <i className="fa-solid fa-chevron-down transition-transform duration-300 group-open:rotate-180 text-slate-400"></i>
                        </summary>
                        <div className="p-5 border-t border-slate-100 space-y-4 bg-slate-50/50">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-600 block">AI Engine</label>
                                <select value={formData.provider} onChange={(e) => setFormData({...formData, provider: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium">
                                    <option value="gemini">Google Gemini (Recommended)</option>
                                    <option value="openai">OpenAI (ChatGPT)</option>
                                    <option value="local (llama.cpp)">Local Model</option>
                                </select>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-600 block">Raw JD Text (Fallback)</label>
                                <textarea rows="3" value={formData.raw_jd_fallback} onChange={(e) => setFormData({...formData, raw_jd_fallback: e.target.value})} placeholder="Paste raw JD text if bot-blockers prevent URL scraping..." className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none custom-scrollbar"></textarea>
                            </div>
                        </div>
                    </details>

                    <div className="flex gap-4 pt-4">
                        {onCancel && <button onClick={onCancel} className="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">Cancel</button>}
                        <button onClick={handleSubmit} className="flex-[2] bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition-transform active:scale-[0.98] flex justify-center items-center gap-2">
                            <i className="fa-solid fa-bolt text-yellow-400"></i> Run Auto-Extraction & Evaluate
                        </button>
                    </div>
                </div>
            );
        }

        function KanbanBoard({ jobs, onUpdateStatus, onViewJob, onDeleteJob, newlyAddedIds, lastViewedJobId, setLastViewedJobId }) {
            const columns = [
                { id: "To Apply", title: "To Apply", icon: "fa-inbox", color: "bg-slate-200 text-slate-700" },
                { id: "Applied", title: "Applied", icon: "fa-paper-plane", color: "bg-blue-100 text-blue-700" },
                { id: "Interviewing", title: "Interviewing", icon: "fa-comments", color: "bg-purple-100 text-purple-700" },
                { id: "Offer / Rejected", title: "Offer / Rejected", icon: "fa-circle-xmark", color: "bg-red-100 text-red-700" }
            ];

            return (
                <div className="flex-1 flex flex-col h-full bg-slate-100">
                    <div className="px-6 py-4 flex items-center">
                        {lastViewedJobId && jobs.find(j => j.id === lastViewedJobId) && (
                            <button 
                                onClick={() => onViewJob(jobs.find(j => j.id === lastViewedJobId))} 
                                className="p-2 mr-2 rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-indigo-600 transition-colors shadow-sm flex items-center justify-center gap-2 text-sm font-bold"
                            >
                                <i className="fa-solid fa-chevron-left"></i> Workspace
                            </button>
                        )}
                    </div>
                    <div className="flex-1 flex overflow-x-auto px-6 pb-6 gap-6 custom-scrollbar">
                        {columns.map(col => (
                            <div key={col.id} className="flex flex-col w-80 shrink-0 h-full max-h-full">
                                <div className={`px-4 py-3 rounded-t-xl font-bold flex items-center justify-between ${col.color}`}>
                                    <div className="flex items-center gap-2"><i className={`fa-solid ${col.icon}`}></i> {col.title}</div>
                                    <span className="bg-white/50 px-2 py-0.5 rounded-full text-xs">{jobs.filter(j => j.status === col.id).length}</span>
                                </div>
                                <div className="flex-1 bg-slate-200/50 rounded-b-xl p-3 overflow-y-auto custom-scrollbar space-y-3 border-x border-b border-slate-200 shadow-inner">
                                    {jobs.filter(j => j.status === col.id).map(job => (
                                        <div key={job.id} 
                                            onClick={() => {
                                                setLastViewedJobId(job.id);
                                                onViewJob(job);
                                            }} 
                                            className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md hover:border-indigo-300 transition-all cursor-pointer relative group"
                                        >
                                            {newlyAddedIds && newlyAddedIds.includes(job.id) && (
                                                <span className="absolute -top-1.5 -right-1.5 flex h-3.5 w-3.5">
                                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                                  <span className="relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500 border border-white"></span>
                                                </span>
                                            )}

                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-slate-800 leading-tight truncate pr-2">{job.title}</h4>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-full border ${job.score >= 80 ? 'bg-green-50 text-green-700 border-green-200' : job.score >= 60 ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 'bg-red-50 text-red-700 border-red-200'}`}>{job.score}/100</span>
                                                    <button onClick={(e) => { e.stopPropagation(); onDeleteJob(job.id); }} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1" title="Delete Job">
                                                        <i className="fa-solid fa-trash-can text-xs"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="flex items-center gap-2 mb-4 text-slate-500">
                                                <p className="text-xs font-semibold truncate">{job.company}</p>
                                            </div>
                                            
                                            <div className="flex justify-between items-center pt-3 border-t border-slate-100" onClick={(e) => e.stopPropagation()}>
                                                <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">View Workspace</span>
                                                <select value={job.status} onChange={(e) => onUpdateStatus(job.id, e.target.value)} className="text-xs border rounded p-1 text-slate-600 focus:outline-none bg-slate-50 hover:bg-slate-100 cursor-pointer">
                                                    {columns.map(c => <option key={c.id} value={c.id}>Move: {c.title}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AgentWorkspace({ jobData, onBack, allJobs, setActiveJob, newlyAddedIds, setLastViewedJobId }) {
            const [leftTab, setLeftTab] = useState('ats');
            const [rightTab, setRightTab] = useState('roadmap');
            const [showDownloadMenu, setShowDownloadMenu] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [hiddenSidebarJobs, setHiddenSidebarJobs] = useState([]);

            // Phase 5 State
            const [showApplyModal, setShowApplyModal] = useState(false);
            const [applyProfile, setApplyProfile] = useState(() => JSON.parse(localStorage.getItem('applyProfile')) || { name: '', email: '', phone: '', linkedin: '', job_url: '' });
            const [isLaunching, setIsLaunching] = useState(false);

            const fullData = jobData.full_data || {};
            const docs = (fullData.generated_docs && fullData.generated_docs.length > 0) ? fullData.generated_docs[0] : {};
            
            // --- PORTFOLIO GENERATOR: Extract Data & Outreach ---
            const portfolio = (fullData.portfolio_outputs && fullData.portfolio_outputs.length > 0) ? fullData.portfolio_outputs[0] : null;
            const outreach = (fullData.outreach_outputs && fullData.outreach_outputs.length > 0) ? fullData.outreach_outputs[0] : null;

            const [isEditingCv, setIsEditingCv] = useState(false);
            const [cvContent, setCvContent] = useState(docs.tailored_cv_markdown || "");
            
            const [isEditingCl, setIsEditingCl] = useState(false);
            const [clContent, setClContent] = useState(docs.cover_letter_markdown || "");

            const [chatInput, setChatInput] = useState("");
            const chatEndRef = useRef(null);
            const [chatHistory, setChatHistory] = useState([
                { role: "agent", content: "I've tailored your CV and drafted a Cover Letter for this role. What would you like to adjust or discuss?" }
            ]);
            
            const evals = (fullData.evaluations && fullData.evaluations.length > 0) ? fullData.evaluations[0] : {};
            const coach = (fullData.coach_outputs && fullData.coach_outputs.length > 0) ? fullData.coach_outputs[0] : {};
            const jobInput = (fullData.jobs_to_process && fullData.jobs_to_process.length > 0) ? fullData.jobs_to_process[0] : {};
            const changesMade = docs.changes_made || [];

            useEffect(() => {
                setCvContent(docs.tailored_cv_markdown || "");
                setClContent(docs.cover_letter_markdown || "");
                setIsEditingCv(false);
                setIsEditingCl(false);
                
                const rawText = (fullData.jobs_to_process && fullData.jobs_to_process.length > 0) ? fullData.jobs_to_process[0].raw_text : "";
                const urlMatch = rawText ? rawText.match(/https?:\/\/[^\s]+/) : null;
                setApplyProfile(prev => ({ ...prev, job_url: urlMatch ? urlMatch[0] : "" }));
            }, [jobData.id]);

            useEffect(() => {
                if (rightTab === 'chat' && chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory, rightTab]);

            const handleSendMessage = async () => {
                if (!chatInput.trim()) return;
                const userMessage = chatInput;
                setChatInput("");
                const newHistory = [...chatHistory, { role: "user", content: userMessage }];
                setChatHistory([...newHistory, { role: "agent", content: "Thinking..." }]);
                try {
                    const res = await fetch(`${API_BASE_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage, history: chatHistory, provider: "gemini" })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setChatHistory([...newHistory, { role: "agent", content: data.reply }]);
                    } else setChatHistory([...newHistory, { role: "agent", content: "⚠️ Backend error." }]);
                } catch(e) {
                    setChatHistory([...newHistory, { role: "agent", content: "⚠️ Connection failed." }]);
                }
            };

            const renderGrade = (val) => {
                const colors = {
                    'A': 'bg-green-100 text-green-800 border-green-200',
                    'B': 'bg-blue-100 text-blue-800 border-blue-200',
                    'C': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                    'D': 'bg-orange-100 text-orange-800 border-orange-200',
                    'F': 'bg-red-100 text-red-800 border-red-200',
                };
                const colorClass = colors[val] || 'bg-slate-100 text-slate-800 border-slate-200';
                return <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold border ${colorClass}`}>{val || '-'}</span>;
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'To Apply': return 'bg-slate-400';
                    case 'Applied': return 'bg-blue-500';
                    case 'Interviewing': return 'bg-purple-500';
                    case 'Offer / Rejected': return 'bg-red-500';
                    default: return 'bg-slate-400';
                }
            };

            const getStatusText = (status) => {
                switch(status) {
                    case 'To Apply': return 'To Apply';
                    case 'Applied': return 'Applied';
                    case 'Interviewing': return 'Interview';
                    case 'Offer / Rejected': return 'Closed';
                    default: return status;
                }
            };

            const dimensionsList = [
                { key: 'Tech Stack', val: evals.tech_stack_match }, { key: 'Seniority', val: evals.role_seniority },
                { key: 'Salary Align', val: evals.salary_alignment }, { key: 'Remote/Visa', val: evals.remote_policy },
                { key: 'Co. Stage', val: evals.company_stage }, { key: 'Domain Fit', val: evals.domain_fit },
                { key: 'Growth', val: evals.growth_opportunities }, { key: 'WLB', val: evals.work_life_balance },
                { key: 'Timezone', val: evals.commute_timezone }, { key: 'Keywords', val: evals.ats_keyword_density },
            ];

            const visibleJobs = allJobs.filter(j => !hiddenSidebarJobs.includes(j.id));

            return (
                <div className="flex h-full bg-slate-50 relative min-w-0 w-full">
                    {/* SIDEBAR */}
                    <div className={`bg-white border-r border-slate-200 flex flex-col shrink-0 z-20 transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-0 overflow-hidden'}`}>
                        <div className="p-3 border-b bg-slate-50 text-[10px] font-bold text-slate-500 uppercase tracking-wider flex justify-between items-center min-w-[256px]">
                            <span>Job Queue</span>
                            <span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full">{visibleJobs.length} Saved</span>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar min-w-[256px]">
                            {visibleJobs.map(job => (
                                <div key={job.id} onClick={() => { setLastViewedJobId(job.id); setActiveJob(job); }} className={`p-4 border-b cursor-pointer transition-colors relative group ${job.id === jobData.id ? 'bg-indigo-50 border-l-4 border-l-indigo-600' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                                    {newlyAddedIds && newlyAddedIds.includes(job.id) && (
                                        <span className="absolute top-4 right-4 h-2 w-2 rounded-full bg-emerald-500"></span>
                                    )}
                                    <div className="flex justify-between items-start mb-1 pr-3">
                                        <h3 className="font-bold text-xs text-slate-900 leading-tight truncate flex items-center gap-1.5">{job.title}</h3>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full border ml-2 ${job.score >= 80 ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{job.score}</span>
                                            <button onClick={(e) => { 
                                                e.stopPropagation(); 
                                                setHiddenSidebarJobs([...hiddenSidebarJobs, job.id]);
                                                if(job.id === jobData.id) onBack(); 
                                            }} className="text-slate-300 hover:text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity p-1" title="Hide from Sidebar">
                                                <i className="fa-solid fa-xmark text-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-[11px] text-slate-500 font-semibold flex items-center gap-1 mt-1 truncate ml-3.5"><i className="fa-regular fa-building"></i> {job.company}</p>
                                    <div className="flex items-center gap-1.5 mt-2 ml-3.5">
                                        <span className={`w-2 h-2 rounded-full ${getStatusColor(job.status)}`}></span>
                                        <span className="text-[10px] text-slate-500 font-bold">{getStatusText(job.status)}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MAIN WORKSPACE */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <div className="bg-white border-b shadow-sm p-4 lg:px-6 z-10 shrink-0 flex flex-col gap-4">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-400 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 rounded transition-colors hidden md:block">
                                        <i className={`fa-solid ${isSidebarOpen ? 'fa-chevron-left' : 'fa-chevron-right'}`}></i>
                                    </button>
                                    <button onClick={onBack} className="p-2 text-slate-400 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 rounded transition-colors hidden md:block md:hidden" title="Back to Kanban">
                                        <i className="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <div>
                                        <h2 className="text-xl md:text-2xl font-extrabold text-slate-900 flex items-center gap-3">
                                            {jobData.company} <span className="text-slate-300 font-light">/</span> {jobData.title}
                                            <span className={`text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1 border inline-block ${jobData.score >= 80 ? 'bg-green-50 text-green-700 border-green-200' : jobData.score >= 60 ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                                <i className="fa-solid fa-check"></i> Match: {evals.overall_score || jobData.score}/100 
                                                <span className="opacity-50 mx-1">|</span> Verdict: {evals.hire_verdict || "Evaluating..."}
                                            </span>
                                            {jobData.source && jobData.source !== "Manual Upload" && (
                                                <span className="text-[10px] font-bold px-3 py-1 rounded-full border bg-slate-50 text-slate-500 border-slate-200 flex items-center gap-1">
                                                    <i className="fa-solid fa-globe"></i> {jobData.source}
                                                </span>
                                            )}
                                        </h2>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 relative shrink-0">
                                    <div className="relative">
                                        <button onClick={() => setShowDownloadMenu(!showDownloadMenu)} onBlur={() => setTimeout(() => setShowDownloadMenu(false), 200)} className="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-bold rounded-lg text-sm shadow-sm hover:bg-slate-50 flex items-center gap-2 transition-colors">
                                            <i className="fa-solid fa-download"></i> Download <i className="fa-solid fa-caret-down ml-1 text-slate-400"></i>
                                        </button>
                                        {showDownloadMenu && (
                                            <div className="absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50">
                                                <button onMouseDown={() => { downloadDoc(jobData.company + '_' + leftTab, leftTab === 'cl' ? clContent : cvContent, 'pdf'); }} className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 border-b flex items-center gap-2"><i className="fa-solid fa-file-pdf text-red-500"></i> PDF (.pdf)</button>
                                                <button onMouseDown={() => { downloadDoc(jobData.company + '_' + leftTab, leftTab === 'cl' ? clContent : cvContent, 'docx'); }} className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 flex items-center gap-2"><i className="fa-solid fa-file-word text-blue-500"></i> Word (.doc)</button>
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={() => setShowApplyModal(true)} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg text-sm shadow-sm hover:bg-indigo-700 flex items-center gap-2 transition-colors">
                                        <i className="fa-solid fa-paper-plane"></i> Auto-Apply
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex overflow-x-auto gap-4 custom-scrollbar pb-1">
                                {dimensionsList.map((dim, i) => (
                                    <div key={i} className="flex flex-col gap-1 shrink-0 items-center min-w-[70px]">
                                        <span className="text-[9px] uppercase font-bold text-slate-400 tracking-wider whitespace-nowrap">{dim.key}</span>
                                        {renderGrade(dim.val)}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row flex-1 min-h-0 bg-slate-100">
                            {/* LEFT PANE (DOCUMENTS & PORTFOLIO) */}
                            <div className="w-full lg:w-3/5 flex flex-col border-r border-slate-200 bg-white h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
                                <div className="flex border-b bg-white overflow-x-auto custom-scrollbar shrink-0 px-2 pt-2 justify-between items-end">
                                    <div className="flex">
                                        <button onClick={() => setLeftTab('jd')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'jd' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-briefcase mr-2"></i> Job Description</button>
                                        <button onClick={() => setLeftTab('ats')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'ats' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-file-contract mr-2"></i> ATS Optimized CV</button>
                                        <button onClick={() => setLeftTab('cl')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'cl' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-envelope-open-text mr-2"></i> Cover Letter</button>
                                        <button onClick={() => setLeftTab('base')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'base' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-file-lines mr-2"></i> Base CV</button>
                                        {/* --- PORTFOLIO GENERATOR: Tab Header --- */}
                                        {portfolio && <button onClick={() => setLeftTab('portfolio')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${leftTab === 'portfolio' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-laptop-code mr-2"></i> Custom Portfolio</button>}
                                    </div>
                                    {leftTab === 'ats' && (
                                        <div className="flex gap-2 pb-2 pr-2">
                                            <button onClick={() => setIsEditingCv(!isEditingCv)} className={`px-3 py-1.5 text-xs font-bold rounded shadow-sm transition-colors ${isEditingCv ? 'bg-green-500 hover:bg-green-600 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200'}`}>
                                                <i className={`fa-solid ${isEditingCv ? 'fa-check' : 'fa-pen'} mr-1`}></i> {isEditingCv ? 'Save Edits' : 'Edit CV'}
                                            </button>
                                        </div>
                                    )}
                                    {leftTab === 'cl' && (
                                        <div className="flex gap-2 pb-2 pr-2">
                                            <button onClick={() => setIsEditingCl(!isEditingCl)} className={`px-3 py-1.5 text-xs font-bold rounded shadow-sm transition-colors ${isEditingCl ? 'bg-green-500 hover:bg-green-600 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200'}`}>
                                                <i className={`fa-solid ${isEditingCl ? 'fa-check' : 'fa-pen'} mr-1`}></i> {isEditingCl ? 'Save Edits' : 'Edit Letter'}
                                            </button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex-1 overflow-y-auto custom-scrollbar bg-white flex relative">
                                    {leftTab === 'jd' && <div className="p-6 md:p-8 w-full"><MarkdownBlock content={jobInput.raw_text} /></div>}
                                    {leftTab === 'base' && <pre className="p-6 md:p-8 font-sans text-sm whitespace-pre-wrap text-slate-700 bg-slate-50 w-full h-full">{fullData.base_cv || "No Base CV available."}</pre>}
                                    
                                    {leftTab === 'cl' && (
                                        <div className="w-full p-6 md:p-8 relative">
                                            {isEditingCl ? (
                                                <textarea value={clContent} onChange={(e) => setClContent(e.target.value)} className="w-full h-full min-h-[500px] p-4 border-2 border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono custom-scrollbar bg-slate-50"/>
                                            ) : (
                                                <MarkdownBlock content={clContent} />
                                            )}
                                        </div>
                                    )}

                                    {leftTab === 'ats' && (
                                        <React.Fragment>
                                            <div className="w-3/4 p-6 md:p-8 border-r border-slate-100 relative">
                                                {isEditingCv ? (
                                                    <textarea value={cvContent} onChange={(e) => setCvContent(e.target.value)} className="w-full h-full min-h-[500px] p-4 border-2 border-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono custom-scrollbar bg-slate-50"/>
                                                ) : (
                                                    <div className="prose prose-sm prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: getDiffHtml(fullData.base_cv, cvContent) }} />
                                                )}
                                            </div>
                                            <div className="w-1/4 bg-slate-50 p-4">
                                                <h4 className="font-bold text-xs uppercase text-slate-500 mb-3 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-indigo-500"></i> Optimization Highlights</h4>
                                                {changesMade.length > 0 ? (
                                                    <ul className="space-y-3">
                                                        {changesMade.map((change, i) => (
                                                            <li key={i} className="text-xs text-slate-700 bg-white p-2.5 rounded border border-slate-200 shadow-sm leading-relaxed"><i className="fa-solid fa-plus text-green-500 mr-1.5"></i> {change}</li>
                                                        ))}
                                                    </ul>
                                                ) : (
                                                    <p className="text-xs text-slate-400 italic">No highlights recorded yet.</p>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    )}

                                    {/* --- PORTFOLIO GENERATOR: Iframe Preview --- */}
                                    {leftTab === 'portfolio' && portfolio && (
                                        <div className="w-full h-full flex flex-col relative bg-slate-800">
                                            <div className="flex justify-between items-center p-3 bg-slate-900 text-white shrink-0 border-b border-slate-700">
                                                <span className="text-xs font-bold flex items-center gap-2 text-indigo-300"><i className="fa-solid fa-code"></i> Live HTML Preview</span>
                                                <button onClick={() => {
                                                    const blob = new Blob([portfolio.html_content], { type: 'text/html' });
                                                    const url = URL.createObjectURL(blob);
                                                    const link = document.createElement('a');
                                                    link.href = url;
                                                    link.download = `${jobData.company.replace(/\s+/g, '_')}_Portfolio.html`;
                                                    link.click();
                                                    URL.revokeObjectURL(url);
                                                }} className="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-lg shadow-sm transition-colors flex items-center gap-2">
                                                    <i className="fa-solid fa-download"></i> Download Webpage
                                                </button>
                                            </div>
                                            <iframe srcDoc={portfolio.html_content} className="w-full flex-1 bg-white" title="Portfolio Preview" sandbox="allow-scripts allow-same-origin" />
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* RIGHT PANE (COACH & ROADMAP) */}
                            <div className="w-full lg:w-2/5 flex flex-col bg-slate-50 h-[50vh] lg:h-full shrink-0 lg:shrink min-w-0">
                                <div className="flex border-b bg-white overflow-x-auto custom-scrollbar shrink-0 px-2 pt-2">
                                    <button onClick={() => setRightTab('roadmap')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'roadmap' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-map-location-dot mr-2"></i> Gaps & Roadmap</button>
                                    <button onClick={() => setRightTab('chat')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'chat' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-robot mr-2"></i> Chat Agent</button>
                                    <button onClick={() => setRightTab('coach')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'coach' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-chalkboard-user mr-2"></i> Interview Coach</button>
                                    {/* --- OUTREACH TAB --- */}
                                    {outreach && <button onClick={() => setRightTab('outreach')} className={`px-4 py-3 text-sm font-bold border-b-2 whitespace-nowrap transition-colors ${rightTab === 'outreach' ? 'border-indigo-600 text-indigo-600 bg-slate-50' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><i className="fa-solid fa-paper-plane mr-2"></i> Outreach</button>}
                                </div>

                                <div className="flex-1 overflow-hidden relative flex flex-col bg-slate-50">
                                    
                                    {rightTab === 'chat' && (
                                        <div className="flex flex-col h-full">
                                            <div className="flex-1 p-4 overflow-y-auto space-y-4 custom-scrollbar">
                                                {chatHistory.map((msg, i) => (
                                                    <div key={i} className={`flex items-start gap-3 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'user' ? 'bg-slate-800 text-white' : 'bg-indigo-600 text-white'}`}>
                                                            <i className={`fa-solid ${msg.role === 'user' ? 'fa-user' : 'fa-robot'} text-xs`}></i>
                                                        </div>
                                                        <div className={`p-3.5 rounded-2xl shadow-sm max-w-[85%] text-sm ${msg.role === 'user' ? 'bg-indigo-100 text-indigo-900 rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none'}`}>
                                                            <MarkdownBlock content={msg.content} />
                                                        </div>
                                                    </div>
                                                ))}
                                                <div ref={chatEndRef} />
                                            </div>
                                            <div className="p-4 bg-white border-t border-slate-200 shrink-0">
                                                <div className="relative flex items-center">
                                                    <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="E.g. Make the cover letter more aggressive..." className="w-full bg-slate-100 border border-transparent focus:border-indigo-300 focus:bg-white rounded-full py-3 pl-4 pr-12 text-sm focus:outline-none transition-all" />
                                                    <button onClick={handleSendMessage} className="absolute right-2 w-8 h-8 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center transition-colors">
                                                        <i className="fa-solid fa-paper-plane text-xs"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {rightTab === 'roadmap' && (
                                        <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar space-y-5">
                                            <div className="p-4 bg-green-50 border border-green-100 rounded-xl shadow-sm">
                                                <h3 className="font-bold text-sm text-green-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-shield-halved"></i> Candidate Strengths</h3>
                                                <ul className="text-xs text-green-700 space-y-1.5 ml-4 list-disc">
