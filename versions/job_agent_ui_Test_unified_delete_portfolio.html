                                            {evals.gap_analysis && evals.gap_analysis.length > 0 && (
                                                <div className="p-4 bg-red-50 border border-red-100 rounded-xl shadow-sm">
                                                    <h3 className="font-bold text-sm text-red-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> Identified Skill Gaps</h3>
                                                    <ul className="text-xs text-red-700 space-y-1.5 ml-4 list-disc">
                                                        {evals.gap_analysis.map((g, i) => <li key={i}>{g}</li>)}
                                                    </ul>
                                                </div>
                                            )}
                                            
                                            <div>
                                                <h3 className="font-bold text-sm text-slate-800 pt-2 border-t border-slate-200 mb-3">Learning Resources</h3>
                                                <details className="group bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-3" open>
                                                    <summary className="p-3.5 font-bold text-sm text-slate-800 cursor-pointer hover:bg-slate-50 flex items-center justify-between select-none">
                                                        <span className="flex items-center gap-2"><i className="fa-solid fa-graduation-cap text-indigo-500"></i> Recommended Curriculum</span>
                                                        <i className="fa-solid fa-chevron-down text-slate-400 transition-transform group-open:rotate-180"></i>
                                                    </summary>
                                                    <div className="p-2 border-t border-slate-100 space-y-2 bg-slate-50/50 max-h-[400px] overflow-y-auto custom-scrollbar">
                                                        {docs.learning_roadmap && docs.learning_roadmap.length > 0 ? docs.learning_roadmap.map((res, i) => (
                                                            <div key={i} className="p-3 bg-white border border-slate-200 rounded-lg shadow-sm flex items-start justify-between hover:border-indigo-300 transition-colors">
                                                                <div>
                                                                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded uppercase ${(res.type && String(res.type).toLowerCase().includes('free')) || (res.cost && String(res.cost).toLowerCase().includes('free')) ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-purple-100 text-purple-700 border border-purple-200'} mb-1 inline-block`}>
                                                                        {res.type || res.cost || "Resource"}
                                                                    </span>
                                                                    <h4 className="font-semibold text-xs text-slate-800 leading-tight">{res.topic || res.title}</h4>
                                                                </div>
                                                                {res.url && res.url !== "#" && (
                                                                    <a href={res.url} target="_blank" rel="noopener noreferrer" className="w-7 h-7 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-colors shrink-0 ml-2">
                                                                        <i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                                                                    </a>
                                                                )}
                                                            </div>
                                                        )) : (
                                                            <div className="text-xs text-slate-500 p-2 italic">No resources populated yet.</div>
                                                        )}
                                                    </div>
                                                </details>
                                            </div>
                                        </div>
                                    )}

                                    {rightTab === 'coach' && (
                                        <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar space-y-4">
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-blue-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-comments text-blue-500"></i> Interview Questions</h3>
                                                <MarkdownBlock content={coach.interview_questions} />
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-green-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-money-bill-wave text-green-500"></i> Salary Strategy</h3>
                                                <MarkdownBlock content={coach.salary_strategy} />
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-purple-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-regular fa-calendar-check text-purple-500"></i> 30-Day Prep Plan</h3>
                                                <MarkdownBlock content={coach.prep_plan} />
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* --- OUTREACH TAB CONTENT --- */}
                                    {rightTab === 'outreach' && outreach && (
                                        <div className="flex-1 overflow-y-auto p-4 md:p-5 custom-scrollbar space-y-4">
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-emerald-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-envelope-open-text text-emerald-500"></i> Cold Email Strategy</h3>
                                                <MarkdownBlock content={outreach.cold_email} />
                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 border-l-4 border-l-indigo-500">
                                                <h3 className="font-bold text-slate-800 mb-3 text-sm flex items-center gap-2"><i className="fa-solid fa-folder-open text-indigo-500"></i> Target Portfolio Strategy</h3>
                                                <MarkdownBlock content={outreach.portfolio_strategy} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {showApplyModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 overflow-y-auto">
                            <div className="bg-white rounded-2xl shadow-xl p-6 md:p-8 w-full max-w-md my-auto relative animate-in fade-in zoom-in duration-200">
                                <button onClick={() => setShowApplyModal(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                                        <i className="fa-solid fa-paper-plane text-lg"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900">Initiate Auto-Apply</h3>
                                </div>
                                <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                    Confirm your profile details below. The agent will launch a browser, navigate to the portal, and map these details.
                                </p>
                                <div className="space-y-3 mb-6">
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">Full Name</label>
                                        <input type="text" value={applyProfile.name} onChange={(e) => setApplyProfile({...applyProfile, name: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">Email Address</label>
                                        <input type="email" value={applyProfile.email} onChange={(e) => setApplyProfile({...applyProfile, email: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">Phone Number</label>
                                        <input type="tel" value={applyProfile.phone} onChange={(e) => setApplyProfile({...applyProfile, phone: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">LinkedIn URL</label>
                                        <input type="url" value={applyProfile.linkedin} onChange={(e) => setApplyProfile({...applyProfile, linkedin: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">Job URL <span className="text-slate-400 font-normal">(Auto-detected)</span></label>
                                        <input type="url" value={applyProfile.job_url} onChange={(e) => setApplyProfile({...applyProfile, job_url: e.target.value})} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50" />
                                    </div>
                                </div>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => setShowApplyModal(false)} disabled={isLaunching} className="px-4 py-2 font-bold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors disabled:opacity-50">Cancel</button>
                                    <button onClick={async () => {
                                        localStorage.setItem('applyProfile', JSON.stringify(applyProfile));
                                        setIsLaunching(true);
                                        try {
                                            const res = await fetch(`${API_BASE_URL}/jobs/${jobData.id}/auto-apply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(applyProfile) });
                                            if(!res.ok) throw new Error("Failed to launch");
                                            setTimeout(() => { setIsLaunching(false); setShowApplyModal(false); }, 1000);
                                        } catch(e) {
                                            alert("Error launching browser. Check server logs.");
                                            setIsLaunching(false);
                                        }
                                    }} disabled={isLaunching} className="px-6 py-2 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-75">
                                        {isLaunching ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <i className="fa-regular fa-circle-play text-lg"></i>} 
                                        {isLaunching ? 'Launching...' : 'Launch Browser'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function JobAgentApp() {
            const [view, setView] = useState('input'); 
            const [activeJob, setActiveJob] = useState(null);
            const [jobs, setJobs] = useState([]);
            const [lastViewedJobId, setLastViewedJobId] = useState(null); 
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [showSearchModal, setShowSearchModal] = useState(false);
            
            const [globalCvFile, setGlobalCvFile] = useState(null);
            const [globalCvText, setGlobalCvText] = useState("");
            const [newlyAddedIds, setNewlyAddedIds] = useState([]);

            const [searchTitle, setSearchTitle] = useState("");
            const [searchLocation, setSearchLocation] = useState("");
            const [searchBoard, setSearchBoard] = useState("All Supported Boards");
            const [searchWorkModel, setSearchWorkModel] = useState("Any");
            const [searchJobType, setSearchJobType] = useState("Any");
            const [searchVisa, setSearchVisa] = useState("Not Required (Citizen/PR)");
            const [searchMaxJobs, setSearchMaxJobs] = useState(5);
            
            const [isSearching, setIsSearching] = useState(false);
            const [searchStatus, setSearchStatus] = useState("");
            const [recentSearches, setRecentSearches] = useState(() => {
                try { return JSON.parse(localStorage.getItem('recentSearches')) || []; }
                catch(e) { return []; }
            });

            // NOTION SYNC STATE
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncMessage, setSyncMessage] = useState(null);

            const fetchJobs = async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/jobs`);
                    if(res.ok) {
                        const data = await res.json();
                        setJobs(data.jobs || []);
                        return data.jobs || [];
                    }
                } catch (err) {
                    console.error("Failed to fetch jobs.", err);
                }
                return [];
            };

            useEffect(() => { 
                fetchJobs(); 
                fetch(`${API_BASE_URL}/profile/cv`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.cv_text) {
                            setGlobalCvText(data.cv_text);
                        }
                    })
                    .catch(err => console.error("Failed to load saved CV profile", err));
            }, []);

            useEffect(() => {
                if (syncMessage) {
                    const timer = setTimeout(() => setSyncMessage(null), 6000);
                    return () => clearTimeout(timer);
                }
            }, [syncMessage]);

            const handleUpdateStatus = async (jobId, newStatus) => {
                try {
                    await fetch(`${API_BASE_URL}/jobs/${jobId}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    fetchJobs();
                } catch (err) {
                    console.error("Failed to update status", err);
                }
            };

            const handleDeleteJob = async (jobId) => {
                try {
                    await fetch(`${API_BASE_URL}/jobs/${jobId}`, { method: 'DELETE' });
                    fetchJobs();
                    if (activeJob && activeJob.id === jobId) {
                        setActiveJob(null);
                    }
                } catch (err) {
                    console.error("Failed to delete job", err);
                }
            };

            const removeSearch = (indexToRemove) => {
                const updated = recentSearches.filter((_, idx) => idx !== indexToRemove);
                setRecentSearches(updated);
                localStorage.setItem('recentSearches', JSON.stringify(updated));
            };

            // NOTION SYNC HANDLER
            const handleSyncNotion = async () => {
                setIsSyncing(true);
                setSyncMessage(null);
                try {
                    const res = await fetch(`${API_BASE_URL}/notion/sync`, { method: 'POST' });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || "Notion Sync failed.");
                    }
                    const data = await res.json();
                    setSyncMessage({ type: 'success', text: `Successfully synced ${data.synced_count} jobs to Notion!` });
                } catch (err) {
                    setSyncMessage({ type: 'error', text: `Sync Error: ${err.message}` });
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleDashboardAutoSearch = async () => {
                if (!searchTitle) {
                    setSearchStatus("❌ Please enter a Target Role.");
                    return;
                }
                if (!globalCvText && !globalCvFile) {
                    setSearchStatus("⚠️ Base CV required. Please use 'Add New Job' to upload your CV first.");
                    return;
                }

                setIsSearching(true);
                setSearchStatus("🔄 Hunting for jobs and running AI evaluations... (This may take a minute)");

                const newSearch = { title: searchTitle, location: searchLocation };
                const updatedSearches = [newSearch, ...recentSearches.filter(s => s.title !== searchTitle || s.location !== searchLocation)].slice(0, 5);
                setRecentSearches(updatedSearches);
                localStorage.setItem('recentSearches', JSON.stringify(updatedSearches));

                try {
                    const payload = new FormData();
                    if (globalCvFile) payload.append("file", globalCvFile);
                    payload.append("base_cv_text", globalCvText || "");
                    payload.append("target_title", searchTitle);
                    payload.append("location", searchLocation);
                    payload.append("provider", "gemini");
                    payload.append("max_jobs", searchMaxJobs);
                    payload.append("job_board", searchBoard);
                    payload.append("work_model", searchWorkModel);
                    payload.append("job_type", searchJobType);
                    payload.append("visa", searchVisa);

                    const response = await fetch(`${API_BASE_URL}/auto-fetch`, {
                        method: 'POST',
                        body: payload
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || "Search failed.");
                    }

                    const data = await response.json();
                    setSearchStatus(`✅ Success! Added ${data.added_jobs} new optimized jobs to your queue.`);
                    if(data.new_job_ids && data.new_job_ids.length > 0) {
                        setNewlyAddedIds(prev => Array.from(new Set([...prev, ...data.new_job_ids])));
                    }
                    fetchJobs(); 
                    
                } catch(e) {
                    setSearchStatus(`❌ Error: ${e.message}`);
                } finally {
                    setIsSearching(false);
                }
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-50 relative">
                    {/* TOAST NOTIFICATION FOR NOTION SYNC */}
                    {syncMessage && (
                        <div className={`fixed top-20 right-6 px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-4 toast-animate border-2 ${syncMessage.type === 'success' ? 'bg-green-600 text-white border-green-400' : 'bg-red-600 text-white border-red-400'}`}>
                            <i className={`fa-solid ${syncMessage.type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'} text-2xl`}></i>
                            <div className="flex flex-col max-w-sm">
                                <span className="font-bold text-sm">{syncMessage.type === 'success' ? 'Notion Sync Complete' : 'Notion Sync Failed'}</span>
                                <span className={`text-xs ${syncMessage.type === 'success' ? 'text-green-100' : 'text-red-100'}`}>{syncMessage.text}</span>
                            </div>
                            <button onClick={() => setSyncMessage(null)} className="ml-2 hover:opacity-75 transition-opacity"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    )}

                    <div className="h-16 border-b bg-slate-900 text-white flex items-center justify-between px-6 shrink-0 z-30 shadow-sm">
                        <div className="font-bold text-lg flex items-center gap-3">
                            <button onClick={() => { setActiveJob(null); }} className="p-1 hover:text-indigo-400 transition-colors md:hidden"><i className="fa-solid fa-bars"></i></button>
                            <div className="cursor-pointer flex items-center gap-3 hover:opacity-80 transition-opacity" onClick={() => { setView('input'); setActiveJob(null); }}>
                                <div className="w-8 h-8 rounded bg-indigo-500 flex items-center justify-center shadow-lg"><i className="fa-solid fa-robot text-white text-sm"></i></div>
                                Career OS
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => { setView('dashboard'); setActiveJob(null); }} className={`px-4 py-2 rounded-lg text-sm font-bold border transition-colors flex items-center gap-2 ${view === 'dashboard' && !activeJob ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-800 hover:bg-slate-700 border-slate-700 text-slate-300'}`}>
                                <i className="fa-solid fa-table-columns"></i> <span className="hidden md:inline">Kanban Board</span>
                            </button>
                            
                            {view === 'dashboard' && (
                                <React.Fragment>
                                    <button onClick={handleSyncNotion} disabled={isSyncing} className={`px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 flex items-center gap-2 ${isSyncing ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-black hover:bg-slate-800 text-white border border-slate-700'}`}>
                                        {isSyncing ? <i className="fa-solid fa-spinner fa-spin text-slate-500"></i> : <NotionIcon />} <span className="hidden md:inline">{isSyncing ? 'Syncing...' : 'Sync to Notion'}</span>
                                    </button>

                                    <button onClick={() => setShowSearchModal(true)} className="px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white">
                                        <i className="fa-solid fa-magnifying-glass"></i> <span className="hidden md:inline">Auto-Search</span>
                                    </button>

                                    <button onClick={() => setShowAddModal(true)} className="px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 flex items-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white">
                                        <i className="fa-solid fa-plus"></i> <span className="hidden md:inline">Add New Job</span>
                                    </button>
                                </React.Fragment>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {view === 'input' && (
                            <div className="absolute inset-0 flex items-center justify-center p-4 bg-slate-100 overflow-y-auto custom-scrollbar">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-6 md:p-8 border border-slate-200 my-auto relative">
                                    <div className="flex flex-col items-center justify-center mb-8">
                                        <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Job Evaluation Agent</h1>
                                        <p className="text-slate-500 text-sm text-center">Upload your CV to automatically hunt for roles, or manually evaluate a specific job description.</p>
                                    </div>
                                    <JobInputForm 
                                        globalCvFile={globalCvFile}
                                        globalCvText={globalCvText}
                                        setGlobalCvFile={setGlobalCvFile}
                                        setGlobalCvText={setGlobalCvText}
                                        onComplete={async (addedJobIds) => {
                                            const updatedJobs = await fetchJobs();
                                            if (addedJobIds && addedJobIds.length > 0) {
                                                setNewlyAddedIds(prev => Array.from(new Set([...prev, ...addedJobIds])));
                                                setActiveJob(null);
                                            } else {
                                                const newActive = updatedJobs[updatedJobs.length - 1];
                                                setActiveJob(newActive);
                                                setLastViewedJobId(newActive.id);
                                            }
                                            setView('dashboard');
                                        }} 
                                    />
                                </div>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="absolute inset-0 flex">
                                {!activeJob ? (
                                    <KanbanBoard 
                                        jobs={jobs} 
                                        onUpdateStatus={handleUpdateStatus} 
                                        onViewJob={(job) => {
                                            setActiveJob(job);
                                            if (newlyAddedIds.includes(job.id)) {
                                                setNewlyAddedIds(prev => prev.filter(id => id !== job.id));
                                            }
                                        }} 
                                        onDeleteJob={handleDeleteJob}
                                        newlyAddedIds={newlyAddedIds}
                                        lastViewedJobId={lastViewedJobId}
                                        setLastViewedJobId={setLastViewedJobId}
                                    />
                                ) : (
                                    <AgentWorkspace 
                                        jobData={activeJob} 
                                        allJobs={jobs} 
                                        setActiveJob={(job) => {
                                            setActiveJob(job);
                                            if (newlyAddedIds.includes(job.id)) {
                                                setNewlyAddedIds(prev => prev.filter(id => id !== job.id));
                                            }
                                        }} 
                                        onBack={() => setActiveJob(null)} 
                                        newlyAddedIds={newlyAddedIds}
                                        setLastViewedJobId={setLastViewedJobId}
                                    />
                                )}
                            </div>
                        )}

                        {/* ADD NEW JOB OVERLAY MODAL */}
                        {showAddModal && view === 'dashboard' && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-6 md:p-8 border border-slate-200 my-auto relative">
                                    <button onClick={() => setShowAddModal(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                    <div className="flex flex-col items-center justify-center mb-8">
                                        <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Job Evaluation Agent</h1>
                                        <p className="text-slate-500 text-sm text-center">Upload your CV to automatically hunt for roles, or manually evaluate a specific job description.</p>
                                    </div>
                                    <JobInputForm 
                                        onCancel={() => setShowAddModal(false)}
                                        globalCvFile={globalCvFile}
                                        globalCvText={globalCvText}
                                        setGlobalCvFile={setGlobalCvFile}
                                        setGlobalCvText={setGlobalCvText}
                                        onComplete={async (addedJobIds) => {
                                            const updatedJobs = await fetchJobs();
                                            if (addedJobIds && addedJobIds.length > 0) {
                                                setNewlyAddedIds(prev => Array.from(new Set([...prev, ...addedJobIds])));
                                                setActiveJob(null);
                                            } else {
                                                const newActive = updatedJobs[updatedJobs.length - 1];
                                                setActiveJob(newActive);
                                                setLastViewedJobId(newActive.id);
                                            }
                                            setShowAddModal(false);
                                        }} 
                                    />
                                </div>
                            </div>
                        )}

                        {/* DASHBOARD AUTO-SEARCH MODAL */}
                        {showSearchModal && view === 'dashboard' && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-xl p-6 md:p-8 border border-slate-200 my-auto relative">
                                    <button onClick={() => !isSearching && setShowSearchModal(false)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors disabled:opacity-50" disabled={isSearching}>
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                    
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                                            <i className="fa-solid fa-earth-americas text-lg"></i>
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-slate-900">Auto-Search Web</h3>
                                            <p className="text-xs text-slate-500">Hunt for roles and auto-evaluate them.</p>
                                        </div>
                                    </div>

                                    {searchStatus && (
                                        <div className={`p-3 rounded-lg text-sm mb-4 font-semibold ${searchStatus.includes('❌') || searchStatus.includes('⚠️') ? 'bg-red-50 text-red-700' : 'bg-indigo-50 text-indigo-700'}`}>
                                            {searchStatus}
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-700">Target Role <span className="text-red-500">*</span></label>
                                                <input type="text" disabled={isSearching} value={searchTitle} onChange={(e) => setSearchTitle(e.target.value)} placeholder="e.g. Senior AI Engineer" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white disabled:bg-slate-50" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-700">Location <span className="text-slate-400 font-normal">(Optional)</span></label>
                                                <input type="text" disabled={isSearching} value={searchLocation} onChange={(e) => setSearchLocation(e.target.value)} placeholder="e.g. London, Remote US" className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white disabled:bg-slate-50" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-600">Work Model</label>
                                                <select disabled={isSearching} value={searchWorkModel} onChange={(e) => setSearchWorkModel(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium">
                                                    <option value="Any">Any</option><option value="Remote">Remote</option><option value="Hybrid">Hybrid</option><option value="On-site">On-site</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-600">Job Type</label>
                                                <select disabled={isSearching} value={searchJobType} onChange={(e) => setSearchJobType(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium">
                                                    <option value="Any">Any</option><option value="Full-time">Full-time</option><option value="Contract">Contract</option><option value="Part-time">Part-time</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-600">Sponsorship / Visa</label>
                                                <select disabled={isSearching} value={searchVisa} onChange={(e) => setSearchVisa(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium">
                                                    <option value="Not Required (Citizen/PR)">Not Required (Citizen/PR)</option><option value="Required">Required</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-600">Target Job Board</label>
                                                <select disabled={isSearching} value={searchBoard} onChange={(e) => setSearchBoard(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white font-medium">
                                                    <option value="All Supported Boards">All Supported Boards (Default)</option>
                                                    <option value="LinkedIn">LinkedIn Only</option>
                                                    <option value="Greenhouse">Greenhouse Only</option>
                                                    <option value="Lever">Lever Only</option>
                                                    <option value="Ashby">Ashby Only</option>
                                                    <option value="Workday">Workday Only</option>
                                                    <option value="Jobright">Jobright.ai Only</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-600">Max Jobs to Pull</label>
                                                <input type="number" min="1" max="10" disabled={isSearching} value={searchMaxJobs} onChange={(e) => setSearchMaxJobs(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-indigo-500 focus:outline-none bg-white disabled:bg-slate-50" />
                                            </div>
                                        </div>

                                        {recentSearches.length > 0 && (
                                            <div className="pt-2 border-t border-slate-100">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">Recent Searches</span>
                                                <div className="flex flex-wrap gap-2">
                                                    {recentSearches.map((s, i) => (
                                                        <div key={i} className="flex items-center px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full text-xs font-semibold transition-colors disabled:opacity-50">
                                                            <span className="cursor-pointer" onClick={() => { if(!isSearching) { setSearchTitle(s.title); setSearchLocation(s.location); } }}>
                                                                {s.title} {s.location ? `• ${s.location}` : ''}
                                                            </span>
                                                            <button onClick={() => removeSearch(i)} className="ml-2 text-slate-400 hover:text-red-500 focus:outline-none">
                                                                <i className="fa-solid fa-xmark"></i>
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-3 justify-end mt-8">
                                        <button onClick={() => setShowSearchModal(false)} disabled={isSearching} className="px-4 py-2 font-bold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors disabled:opacity-50">
                                            Cancel
                                        </button>
                                        <button onClick={handleDashboardAutoSearch} disabled={isSearching} className="px-6 py-2 bg-emerald-500 text-white font-bold rounded-xl shadow-md hover:bg-emerald-600 flex items-center gap-2 transition-transform active:scale-95 disabled:opacity-70">
                                            {isSearching ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-radar-indicator"></i>} 
                                            {isSearching ? 'Hunting...' : 'Start Hunt'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<JobAgentApp />);
    </script>
</body>
</html>
